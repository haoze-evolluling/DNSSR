<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root{--bg:#f4f8ff;--surface:#fff;--text:#202124;--muted:#667085;--primary:#176b5b;--outline:#d6deeb;--blue:#1570ef;--cyan:#0891b2;--green:#039855}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;letter-spacing:0}.hero{padding:22px 18px 10px}.hero h1{font-size:24px;margin:0 0 6px}.hero p{color:var(--muted);margin:0;line-height:1.5}.state{margin:12px 16px;padding:16px;border:1px solid var(--outline);border-left:6px solid var(--cyan);border-radius:8px;color:var(--text);background:transparent}.state strong{display:block;font-size:18px;margin-bottom:4px}.state span{font-size:13px;color:var(--muted)}.grid{display:grid;gap:12px;padding:0 16px 28px}.card{background:var(--surface);border:1px solid var(--outline);border-radius:8px;padding:16px;border-left:4px solid var(--blue)}.card.runtime{border-left-color:var(--green)}h2{font-size:16px;margin:0 0 12px}.row{padding:12px 0;border-top:1px solid var(--outline);display:flex;justify-content:space-between;gap:12px}.row:first-child{border-top:0}.tag{color:var(--blue);font-weight:700;background:color-mix(in srgb,var(--blue) 10%,transparent);border-radius:6px;padding:4px 8px}@media(min-width:720px){.grid,.hero,.state{max-width:980px;margin-left:auto;margin-right:auto}.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
</style></head><body><script src="log_dashboard_topbar.js"></script><script>mountLogDashboardTopbar('请求日志已关闭');</script>
<header class="hero"><h1>日志记录已暂停</h1><p>当前不会保存 DNS 或 HTTPS 请求记录，缓存和解析服务仍正常运行。</p></header><section class="state"><strong>隐私模式运行中</strong><span>重新开启日志后，仪表盘将从新产生的请求开始统计。</span></section>
<main class="grid"><article class="card"><h2>DNS 缓存</h2><div id="cache"></div></article><article class="card runtime"><h2>解析运行状态</h2><div id="runtime"></div></article></main>
<script>
const $=id=>document.getElementById(id);function setTheme(t){if(!t)return;for(const [k,v] of Object.entries({bg:t.background,surface:t.surface,text:t.onSurface,muted:t.onSurfaceVariant,primary:t.primary,outline:t.outline}))document.documentElement.style.setProperty(`--${k}`,v)}
function render(d){const c=d.cacheEntries||d.cache||[],r=d.race||d.raceStats||{},b=d.bootstrap||d.bootstrapStats||{};$('updated').textContent=`请求日志已关闭 · ${new Date(d.generatedAt).toLocaleTimeString()}`;$('cache').innerHTML=`<div class="row"><span>当前有效条目</span><span class="tag">${c.length}</span></div><div class="row"><span>累计缓存命中</span><span class="tag">${c.reduce((n,x)=>n+(x.hitCount||0),0)}</span></div>`;$('runtime').innerHTML=`<div class="row"><span>竞速请求</span><span class="tag">${r.requests||0}</span></div><div class="row"><span>Bootstrap 尝试</span><span class="tag">${b.attempts||0}</span></div>`}
window.DNSSR={render,setTheme};
</script></body></html>
