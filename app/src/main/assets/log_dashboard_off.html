<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root{--bg:#fafafa;--surface:#fff;--text:#202124;--muted:#5f6368;--primary:#176b5b;--outline:#d7d9dc}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;letter-spacing:0}.hero{padding:32px 20px 16px}.hero h1{font-size:24px;margin:0 0 8px}.hero p,.muted{color:var(--muted);margin:0}.grid{display:grid;gap:12px;padding:12px 16px 28px}.card{background:var(--surface);border:1px solid var(--outline);border-radius:8px;padding:16px}.status{border-left:4px solid var(--primary)}h2{font-size:16px;margin:0 0 12px}.row{padding:11px 0;border-top:1px solid var(--outline);display:flex;justify-content:space-between;gap:12px}.row:first-of-type{border-top:0}.tag{color:var(--muted)}@media(min-width:720px){.grid,.hero{max-width:980px;margin:auto}.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.status{grid-column:1/-1}}
</style></head><body><script src="log_dashboard_topbar.js"></script><script>mountLogDashboardTopbar('DNS 日志已关闭');</script><header class="hero"><h1>DNS 日志已关闭</h1><p>请求处理不会创建或写入 DNS 日志。</p></header><main class="grid"><article class="card status"><h2>省电记录模式</h2><div class="muted">已有历史日志会保留，重新开启记录后仍可查看。</div></article><article class="card"><h2>DNS 缓存</h2><div id="cache"></div></article><article class="card"><h2>解析运行状态</h2><div id="runtime"></div></article></main><script>
const $=id=>document.getElementById(id);function setTheme(t){if(!t)return;for(const [k,v] of Object.entries({bg:t.background,surface:t.surface,text:t.onSurface,muted:t.onSurfaceVariant,primary:t.primary,outline:t.outline}))document.documentElement.style.setProperty(`--${k}`,v)}function render(d){const c=d.cacheEntries||[],r=d.race||{},b=d.bootstrap||{};$('cache').innerHTML=`<div class="row"><span>当前展示条目</span><span class="tag">${c.length}</span></div><div class="row"><span>累计命中</span><span class="tag">${c.reduce((n,x)=>n+(x.hitCount||0),0)}</span></div>`;$('runtime').innerHTML=`<div class="row"><span>竞速请求</span><span class="tag">${r.requests||0}</span></div><div class="row"><span>Bootstrap 尝试</span><span class="tag">${b.attempts||0}</span></div>`}window.DNSSR={render,setTheme};
</script></body></html>
