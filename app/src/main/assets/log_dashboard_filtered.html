<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root{--bg:#fafafa;--surface:#fff;--text:#202124;--muted:#5f6368;--primary:#176b5b;--outline:#d7d9dc;--error:#b3261e}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;letter-spacing:0}.hero{padding:28px 20px 12px}.hero h1{font-size:24px;margin:0 0 6px}.hero p,.muted{color:var(--muted);margin:0}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;padding:12px 16px 28px}.card{background:var(--surface);border:1px solid var(--outline);border-radius:8px;padding:16px;min-width:0}.wide{grid-column:1/-1}.label{font-size:13px;color:var(--muted)}.value{font-size:28px;font-weight:700;margin-top:5px}.blocked{color:var(--error)}h2{font-size:16px;margin:0 0 12px}.row{padding:11px 0;border-top:1px solid var(--outline);display:flex;justify-content:space-between;gap:12px}.row:first-of-type{border-top:0}.name{overflow-wrap:anywhere}.tag{color:var(--muted);white-space:nowrap}.empty{color:var(--muted);padding:10px 0}@media(min-width:720px){.grid{grid-template-columns:repeat(4,minmax(0,1fr));max-width:980px;margin:auto}.hero{max-width:980px;margin:auto}}
</style></head><body><script src="log_dashboard_topbar.js"></script><script>mountLogDashboardTopbar('DNS 仅记录拦截与错误');</script><header class="hero"><h1>请求日志</h1><p>DNS 仅记录拦截与错误，HTTPS 记录不受影响</p></header><main class="grid"><article class="card"><div class="label">今日拦截</div><div id="blocked" class="value blocked">0</div></article><article class="card"><div class="label">今日错误</div><div id="errors" class="value">0</div></article><article class="card"><div class="label">今日通过</div><div id="passed" class="value">0</div></article><article class="card"><div class="label">HTTPS 旁路</div><div id="bypassed" class="value">0</div></article><article class="card wide"><h2>最近请求</h2><div id="logs"></div></article><article class="card wide"><h2>订阅拦截</h2><div id="subscriptions"></div></article><article class="card wide"><h2>运行状态</h2><div id="runtime"></div></article></main>
<script>
const $=id=>document.getElementById(id),esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));function rows(id,data,map,empty){$(id).innerHTML=data&&data.length?data.map(map).join(''):`<div class="empty">${empty}</div>`}function setTheme(t){if(!t)return;for(const [k,v] of Object.entries({bg:t.background,surface:t.surface,text:t.onSurface,muted:t.onSurfaceVariant,primary:t.primary,outline:t.outline,error:t.error}))document.documentElement.style.setProperty(`--${k}`,v)}function render(d){const s=d.dailyStats||{};$('blocked').textContent=s.blocked||0;$('errors').textContent=s.error||0;$('passed').textContent=s.passed||0;$('bypassed').textContent=s.bypassed||0;$('updated').textContent=`DNS 仅记录拦截与错误 · ${new Date(d.generatedAt).toLocaleTimeString()}`;rows('logs',d.recentLogs,x=>`<div class="row"><span class="name">${esc(x.name)}<br><small>${esc(x.source)} · ${esc(x.meta)}</small></span><span class="tag">${esc(x.resultLabel)}</span></div>`,'暂无请求日志');rows('subscriptions',(d.subscriptions||{}).items,x=>`<div class="row"><span class="name">${esc(x.name)}</span><span class="tag">${x.hits||0} 次</span></div>`,'暂无订阅拦截数据');const r=d.race||{},b=d.bootstrap||{};$('runtime').innerHTML=`<div class="row"><span>竞速请求</span><span class="tag">${r.requests||0}</span></div><div class="row"><span>Bootstrap 尝试</span><span class="tag">${b.attempts||0}</span></div><div class="row"><span>有效缓存</span><span class="tag">${(d.cacheEntries||[]).length}</span></div>`}window.DNSSR={render,setTheme};
</script></body></html>
