<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root{--bg:#f5f7fb;--surface:#fff;--text:#202124;--muted:#667085;--primary:#176b5b;--outline:#d8dee9;--error:#d92d20;--amber:#f79009;--violet:#7f56d9;--blue:#1570ef}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;letter-spacing:0}.hero{padding:22px 18px 10px}.hero h1{font-size:24px;margin:0 0 6px}.hero p{color:var(--muted);margin:0;line-height:1.5}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;padding:12px 16px 28px}.card{background:var(--surface);border:1px solid var(--outline);border-radius:8px;padding:16px;min-width:0;border-top:4px solid var(--blue)}.card.block{border-top-color:var(--error)}.card.fail{border-top-color:var(--amber)}.card.bypass{border-top-color:var(--violet)}.wide{grid-column:1/-1;border-top-color:var(--primary)}.label{font-size:13px;color:var(--muted)}.value{font-size:30px;font-weight:750;margin-top:5px}.red{color:var(--error)}.orange{color:var(--amber)}.purple{color:var(--violet)}h2{font-size:16px;margin:0 0 12px}.row{padding:11px 0;border-top:1px solid var(--outline);display:flex;justify-content:space-between;align-items:center;gap:12px}.row:first-child{border-top:0}.name{overflow-wrap:anywhere}.name small{color:var(--muted)}.tag{color:var(--primary);background:color-mix(in srgb,var(--primary) 12%,transparent);border-radius:6px;padding:4px 7px;white-space:nowrap}.empty{color:var(--muted);padding:10px 0}@media(min-width:720px){.grid{grid-template-columns:repeat(3,minmax(0,1fr));max-width:980px;margin:auto}.hero{max-width:980px;margin:auto}}
</style></head><body><script src="log_dashboard_topbar.js"></script><script>mountLogDashboardTopbar('仅记录拦截与错误');</script>
<header class="hero"><h1>重点请求概览</h1><p>仅汇总 DNS 与 HTTPS 的拦截、错误和旁路记录。</p></header>
<main class="grid"><article class="card block"><div class="label">今日拦截</div><div id="blocked" class="value red">0</div></article><article class="card fail"><div class="label">今日错误</div><div id="errors" class="value orange">0</div></article><article class="card bypass"><div class="label">今日旁路</div><div id="bypassed" class="value purple">0</div></article><article class="card wide"><h2>最近重点请求</h2><div id="logs"></div></article><article class="card wide"><h2>订阅拦截</h2><div id="subscriptions"></div></article><article class="card wide"><h2>解析运行状态</h2><div id="runtime"></div></article></main>
<script>
const $=id=>document.getElementById(id),esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function rows(id,data,map,empty){$(id).innerHTML=data&&data.length?data.map(map).join(''):`<div class="empty">${empty}</div>`}
function setTheme(t){if(!t)return;for(const [k,v] of Object.entries({bg:t.background,surface:t.surface,text:t.onSurface,muted:t.onSurfaceVariant,primary:t.primary,outline:t.outline,error:t.error}))document.documentElement.style.setProperty(`--${k}`,v)}
function render(d){const s=d.dailyStats||d.stats||{},logs=d.recentLogs||d.requests||d.logs||[],subs=d.subscriptions||d.subscriptionStats||{},r=d.race||d.raceStats||{},b=d.bootstrap||d.bootstrapStats||{},cache=d.cacheEntries||d.cache||[];$('blocked').textContent=s.blocked||0;$('errors').textContent=s.error||0;$('bypassed').textContent=s.bypassed||0;$('updated').textContent=`仅记录拦截与错误 · ${new Date(d.generatedAt).toLocaleTimeString()}`;rows('logs',logs,x=>`<div class="row"><span class="name">${esc(x.name)}<br><small>${esc(x.source)} · ${esc(x.meta)}</small></span><span class="tag">${esc(x.resultLabel)}</span></div>`,'暂无拦截或错误记录');rows('subscriptions',subs.items,x=>`<div class="row"><span class="name">${esc(x.name)}</span><span class="tag">${x.hits||0} 次</span></div>`,'暂无订阅拦截数据');$('runtime').innerHTML=`<div class="row"><span>竞速请求</span><span class="tag">${r.requests||0}</span></div><div class="row"><span>Bootstrap 尝试</span><span class="tag">${b.attempts||0}</span></div><div class="row"><span>有效缓存</span><span class="tag">${cache.length}</span></div>`}
window.DNSSR={render,setTheme};
</script></body></html>
